name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app

            if [ ! -d ".git" ]; then
              git clone https://github.com/vigneshalbert/Devops-Project.git .
            else
              git fetch origin
              git reset --hard origin/main
            fi

            sudo docker stop devops-container || true
            sudo docker rm devops-container || true
            sudo docker rmi devops-app || true

            sudo docker build -t devops-app .

            sudo docker run -d -p 8081:80 --name devops-container devops-app
